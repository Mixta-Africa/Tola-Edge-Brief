name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-out
          token: ${{ secrets.GH_DEPLOY_TOKEN }}
        continue-on-error: true

      - name: Initialise gh-pages if it doesn't exist yet
        run: |
          if [ ! -d "gh-pages-out/.git" ]; then
            mkdir -p gh-pages-out
            cd gh-pages-out
            git init
            git remote add origin https://x-access-token:${{ secrets.GH_DEPLOY_TOKEN }}@github.com/${{ github.repository }}.git
            git checkout --orphan gh-pages
          fi

      - name: Copy app files
        run: |
          cp index.html gh-pages-out/index.html
          mkdir -p gh-pages-out/data
          cp data/mixta-context.json gh-pages-out/data/mixta-context.json
          mkdir -p gh-pages-out/vault

      - name: Write config.json from GitHub Secrets
        # The ONLY place credentials touch the deployment.
        # config.json lives on gh-pages only — never committed to main branch.
        # GH_PAT_APP needs workflow:write scope to trigger generate-brief.yml.
        env:
          GH_OWNER:   ${{ github.repository_owner }}
          GH_REPO:    ${{ github.event.repository.name }}
          GH_PAT_APP: ${{ secrets.GH_PAT_APP }}
        run: |
          cat > gh-pages-out/data/config.json << EOF
          {
            "owner": "${GH_OWNER}",
            "repo":  "${GH_REPO}",
            "token": "${GH_PAT_APP}"
          }
          EOF
          echo "config.json written for ${GH_OWNER}/${GH_REPO}"

      - name: Initialise data files if absent
        run: |
          if [ ! -f "gh-pages-out/data/brief_output.json" ]; then
            echo '{"request_id":"","status":"idle","brief":null,"generated_at":""}' \
              > gh-pages-out/data/brief_output.json
          fi
          if [ ! -f "gh-pages-out/data/vault_index.json" ]; then
            echo '[]' > gh-pages-out/data/vault_index.json
          fi

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-out
          git config user.name  "Deploy Bot"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet \
            || git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages

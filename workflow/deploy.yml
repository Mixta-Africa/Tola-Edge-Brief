name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Build site folder
        env:
          GH_OWNER:   ${{ github.repository_owner }}
          GH_REPO:    ${{ github.event.repository.name }}
          GH_PAT_APP: ${{ secrets.GH_PAT_APP }}
        run: |
          mkdir -p _site/data _site/vault

          # Inject credentials directly into index.html via sed.
          # This avoids writing a separate config.json file, which GitHub's
          # artifact uploader can strip if it detects secret-like content.
          sed \
            -e "s|%%GH_OWNER%%|${GH_OWNER}|g" \
            -e "s|%%GH_REPO%%|${GH_REPO}|g" \
            -e "s|%%GH_PAT_APP%%|${GH_PAT_APP}|g" \
            index.html > _site/index.html

          echo "Verifying injection (token masked):"
          grep "owner:" _site/index.html | head -1
          grep "repo:"  _site/index.html | head -1

          # Mixta context (no credentials — safe to serve)
          cp data/mixta-context.json _site/data/mixta-context.json

          # Seed empty data files so the app doesn't 404 on first load
          echo '{"request_id":"","status":"idle","brief":null,"generated_at":""}' \
            > _site/data/brief_output.json
          echo '[]' > _site/data/vault_index.json

          # Prevent Jekyll from interfering
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

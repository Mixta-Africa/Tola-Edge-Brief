<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tola Edge Brief</title>
    
    <!-- Fonts: Playfair Display (Masthead) & Inter (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    
    <!-- React & Babel for zero-build execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS & Tabler Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons-webfont.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0C2D5A',
                        customBlue: '#185FA5',
                        bgOffWhite: '#F7F8FA'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F7F8FA; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TolaEdgeBrief() {
            // State Management
            const [activeMarket] = useState('Nigeria'); // Locked to Nigeria context
            const [activeDomains, setActiveDomains] = useState(new Set(['Market Creation', 'Capital & Financing', 'Land & Regulatory Alpha']));
            const [customPrompt, setCustomPrompt] = useState('');
            const [loading, setLoading] = useState(false);
            const [brief, setBrief] = useState(null);
            const [vaultFiles, setVaultFiles] = useState([]);

            // The 6 strategic domains
            const domains = [
                { name: 'Market Creation', icon: 'ti-chart-arcs' },
                { name: 'Capital & Financing', icon: 'ti-cash' },
                { name: 'Land & Regulatory Alpha', icon: 'ti-map-pin' },
                { name: 'Demand-Side Market', icon: 'ti-users' },
                { name: 'Partnership & JV', icon: 'ti-hand-shake' },
                { name: 'Geopolitical Risk', icon: 'ti-shield-alert' }
            ];

            // Load Knowledge Vault history on startup[cite: 1]
            useEffect(() => {
                fetch('../data/briefings-index.json')
                    .then(res => res.json())
                    .then(data => setVaultFiles(data.briefings || []))
                    .catch(() => console.log("Vault empty. Awaiting first run."));
                
                // Automatically load the latest brief if available
                fetch('../data/briefing.json')
                    .then(res => res.json())
                    .then(data => setBrief(data))
                    .catch(() => console.log("No current brief data found."));
            }, []);

            const toggleDomain = (name) => {
                const newDomains = new Set(activeDomains);
                if (newDomains.has(name)) {
                    if (newDomains.size > 1) newDomains.delete(name); 
                } else {
                    newDomains.add(name);
                }
                setActiveDomains(newDomains);
            };

            // Secure Remote-Control Trigger
            const handleGenerate = async () => {
                setLoading(true);
                
                try {
                    // SECURE TRIGGER: This pings your GitHub Actions to wake up the backend scraper
                    // NOTE: You will need to replace GITHUB_USERNAME, REPO_NAME, and YOUR_PAT_TOKEN
                    /*
                    await fetch('https://api.github.com/repos/GITHUB_USERNAME/REPO_NAME/dispatches', {
                        method: 'POST',
                        headers: {
                            'Accept': 'application/vnd.github.v3+json',
                            'Authorization': 'token YOUR_PAT_TOKEN' 
                        },
                        body: JSON.stringify({ event_type: 'trigger_brief_generation' })
                    });
                    */
                    
                    // Simulate processing time for UI feedback
                    alert("Intelligence engine triggered securely. The backend scraper is now running. Please refresh the page in 3 minutes.");
                } catch (e) {
                    console.error("Trigger failed:", e);
                    alert("Failed to reach the intelligence engine.");
                } finally {
                    setLoading(false);
                }
            };

            const handleCopy = () => {
                if (!brief) return;
                navigator.clipboard.writeText(JSON.stringify(brief, null, 2));
                alert("Brief structured data copied to clipboard.");
            };

            return (
                <div className="max-w-6xl mx-auto px-4 py-10 fade-in">
                    {/* Header: Executive styling[cite: 1] */}
                    <div className="border-b border-gray-200 pb-6 mb-8 flex justify-between items-end">
                        <div>
                            <p className="text-xs uppercase tracking-widest text-gray-400 font-semibold mb-2">Intelligence Brief · Tola Akinsulire</p>
                            <h1 className="text-4xl font-display text-navy">The Tola Edge Brief</h1>
                        </div>
                        <p className="text-sm text-gray-500 font-medium">
                            {new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                        </p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                        {/* Sidebar Controls */}
                        <div className="lg:col-span-4 space-y-6">
                            {/* Market Focus */}
                            <div className="bg-white p-5 rounded border border-gray-200 shadow-sm">
                                <h3 className="text-xs font-semibold uppercase text-gray-400 tracking-wider mb-4">Market Focus</h3>
                                <button className="w-full py-2 px-3 text-sm font-medium rounded bg-customBlue text-white shadow-sm flex justify-between items-center">
                                    <span>Nigeria</span>
                                    <i className="ti ti-lock text-white/70"></i>
                                </button>
                            </div>

                            {/* Domain Matrix[cite: 1] */}
                            <div className="bg-white p-5 rounded border border-gray-200 shadow-sm">
                                <h3 className="text-xs font-semibold uppercase text-gray-400 tracking-wider mb-4">Strategic Domains</h3>
                                <div className="space-y-2">
                                    {domains.map(d => {
                                        const isActive = activeDomains.has(d.name);
                                        return (
                                            <div 
                                                key={d.name}
                                                onClick={() => toggleDomain(d.name)}
                                                className={`flex items-center p-3 rounded cursor-pointer border transition-colors ${isActive ? 'bg-blue-50 border-customBlue text-navy font-medium' : 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50'}`}
                                            >
                                                <i className={`ti ${d.icon} text-lg mr-3 ${isActive ? 'text-customBlue' : 'text-gray-400'}`}></i>
                                                <span className="text-sm">{d.name}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Custom Prompt */}
                            <div className="bg-white p-5 rounded border border-gray-200 shadow-sm">
                                <h3 className="text-xs font-semibold uppercase text-gray-400 tracking-wider mb-3">Targeted Query</h3>
                                <input 
                                    type="text" 
                                    className="w-full p-3 text-sm bg-bgOffWhite border border-gray-200 rounded focus:outline-none focus:border-customBlue transition-colors"
                                    placeholder="e.g., Access Bank mortgage criteria..."
                                    value={customPrompt}
                                    onChange={(e) => setCustomPrompt(e.target.value)}
                                />
                            </div>

                            {/* Generate Trigger */}
                            <button 
                                onClick={handleGenerate}
                                disabled={loading}
                                className="w-full bg-navy text-white font-medium py-3.5 rounded shadow-sm hover:bg-opacity-90 transition-all flex justify-center items-center gap-2 disabled:bg-gray-400"
                            >
                                {loading ? (
                                    <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                ) : (
                                    <>
                                        <i className="ti ti-bolt text-lg"></i>
                                        <span>Execute Intelligence Scan</span>
                                    </>
                                )}
                            </button>
                        </div>

                        {/* Brief Output Area */}
                        <div className="lg:col-span-8 space-y-8">
                            {brief ? (
                                <div className="fade-in space-y-8">
                                    {/* Component 1: Narrative (Signature left border)[cite: 1] */}
                                    <div className="bg-white p-8 rounded border border-gray-200 shadow-sm border-l-[3px] border-l-customBlue">
                                        <h2 className="text-xs font-semibold text-navy uppercase tracking-widest mb-5">Executive Narrative</h2>
                                        <div className="text-sm text-gray-800 leading-relaxed space-y-4 whitespace-pre-wrap">
                                            {brief.executive_summary}
                                        </div>
                                    </div>

                                    {/* Component 2: Story Cards[cite: 1] */}
                                    <div>
                                        <h2 className="text-xs font-semibold text-navy uppercase tracking-widest mb-4">Signal Analysis</h2>
                                        <div className="space-y-4">
                                            {(brief.themes || []).map((theme, idx) => (
                                                <div key={idx} className="bg-white p-6 rounded border border-gray-200 shadow-sm">
                                                    <div className="flex justify-between items-start mb-3">
                                                        <span className="bg-bgOffWhite text-gray-600 border border-gray-200 text-xs font-medium px-2.5 py-1 rounded">
                                                            {theme.label}
                                                        </span>
                                                        <span className={`text-[10px] uppercase font-bold px-2.5 py-1 rounded ${theme.confidence === 'high' ? 'bg-green-50 text-green-700' : 'bg-yellow-50 text-yellow-700'}`}>
                                                            {theme.confidence} Impact
                                                        </span>
                                                    </div>
                                                    <h3 className="text-base font-semibold text-navy mb-3">{theme.what_happened}</h3>
                                                    
                                                    <div className="bg-bgOffWhite p-4 rounded border border-gray-200 mb-3">
                                                        <p className="text-[10px] font-bold text-customBlue uppercase tracking-widest mb-1.5">Mixta Relevance</p>
                                                        <p className="text-sm text-gray-700">{theme.why_it_matters_to_mixta}</p>
                                                    </div>
                                                    
                                                    <div className="text-sm text-gray-600 bg-white border border-gray-100 p-3 rounded">
                                                        <span className="font-semibold text-navy">Action:</span> {theme.recommendation}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Actions */}
                                    <div className="flex justify-end">
                                        <button onClick={handleCopy} className="px-5 py-2.5 bg-white border border-gray-200 rounded text-sm font-medium text-gray-600 hover:bg-gray-50 flex items-center gap-2 transition-colors">
                                            <i className="ti ti-copy"></i> Copy Structured Data
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-white rounded border border-gray-200 p-16 text-center text-gray-400 shadow-sm">
                                    <i className="ti ti-shield-lock text-5xl mb-4 text-gray-300"></i>
                                    <p className="text-base font-medium text-gray-500 mb-1">System Ready</p>
                                    <p className="text-sm">Click execute to synthesize today's market intelligence.</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Component 3: Knowledge Vault Footer[cite: 1] */}
                    <div className="mt-16 bg-white rounded border border-gray-200 shadow-sm p-8 fade-in">
                        <div className="flex items-center gap-3 border-b border-gray-100 pb-4 mb-6">
                            <i className="ti ti-server text-navy text-xl"></i>
                            <h2 className="text-sm font-semibold text-navy uppercase tracking-widest">Vault Archives</h2>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {vaultFiles.length > 0 ? vaultFiles.map((file, idx) => (
                                <div key={idx} className="p-4 border border-gray-100 rounded hover:border-customBlue transition-colors bg-bgOffWhite cursor-pointer group">
                                    <p className="text-xs font-semibold text-gray-700 mb-1 group-hover:text-customBlue transition-colors">{file.date}</p>
                                    <p className="text-xs text-gray-500 truncate">{file.executive_summary ? file.executive_summary : 'Intelligence Record'}</p>
                                </div>
                            )) : (
                                <p className="text-sm text-gray-400 col-span-3">Archives will populate automatically after successful pipeline executions.</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TolaEdgeBrief />);
    </script>
</body>
</html>

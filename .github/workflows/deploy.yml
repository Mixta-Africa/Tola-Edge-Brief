name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Build site folder
        env:
          GH_PAT_APP: ${{ secrets.GH_PAT_APP }}
        run: |
          mkdir -p _site/data _site/vault

          # Inject only the token — owner and repo are hardcoded in index.html
          sed "s|%%GH_PAT_APP%%|${GH_PAT_APP}|g" index.html > _site/index.html

          # Verify token was injected (show first 12 chars only)
          TOKEN_CHECK=$(grep "token:" _site/index.html | head -1 | tr -d " '," | cut -c7-18)
          echo "Token prefix injected: ${TOKEN_CHECK}..."

          # Mixta context
          cp data/mixta-context.json _site/data/mixta-context.json

          # Copy brief output from main branch (written by generate-brief.yml).
          # Falls back to empty seed if no brief has been generated yet.
          if [ -f data/brief_output.json ]; then
            cp data/brief_output.json _site/data/brief_output.json
            echo "Deployed existing brief_output.json"
          else
            echo '{"request_id":"","status":"idle","brief":null,"generated_at":""}'               > _site/data/brief_output.json
            echo "Seeded empty brief_output.json"
          fi

          if [ -f data/vault_index.json ]; then
            cp data/vault_index.json _site/data/vault_index.json
            [ -d data/vault ] && cp -r data/vault _site/data/vault || true
            echo "Deployed existing vault"
          else
            echo '[]' > _site/data/vault_index.json
            echo "Seeded empty vault_index.json"
          fi

          # Thought Leadership track — separate files, separate vault
          # subfolder. This copy is independent of the commercial vault
          # block above — it must not assume the commercial brief has ever
          # run (a repo could have TL briefs with zero commercial briefs,
          # or vice versa).
          mkdir -p _site/data/vault/thought-leadership
          if [ -f data/tl_brief_output.json ]; then
            cp data/tl_brief_output.json _site/data/tl_brief_output.json
            echo "Deployed existing tl_brief_output.json"
          else
            echo '{"request_id":"","status":"idle","brief":null,"generated_at":""}' \
              > _site/data/tl_brief_output.json
            echo "Seeded empty tl_brief_output.json"
          fi

          if [ -f data/tl_vault_index.json ]; then
            cp data/tl_vault_index.json _site/data/tl_vault_index.json
            echo "Deployed existing thought-leadership vault index"
          else
            echo '[]' > _site/data/tl_vault_index.json
            echo "Seeded empty tl_vault_index.json"
          fi

          if [ -d data/vault/thought-leadership ]; then
            cp -r data/vault/thought-leadership/. _site/data/vault/thought-leadership/
            echo "Deployed existing thought-leadership vault archive"
          fi

          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

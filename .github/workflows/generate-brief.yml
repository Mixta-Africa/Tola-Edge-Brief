name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Build site folder
        env:
          GH_OWNER:   ${{ github.repository_owner }}
          GH_REPO:    ${{ github.event.repository.name }}
          GH_PAT_APP: ${{ secrets.GH_PAT_APP }}
        run: |
          mkdir -p _site/data _site/vault

          # App shell
          cp index.html _site/index.html

          # Mixta context (safe to be public — no credentials)
          cp data/mixta-context.json _site/data/mixta-context.json

          # config.json — credentials injected here, never committed to main
          # GH_PAT_APP must be a fine-grained PAT scoped to this repo only,
          # with Actions: read & write permission.
          cat > _site/data/config.json << EOF
          {
            "owner": "${GH_OWNER}",
            "repo":  "${GH_REPO}",
            "token": "${GH_PAT_APP}"
          }
          EOF
          echo "config.json written for ${GH_OWNER}/${GH_REPO}"

          # Seed empty data files so the app doesn't 404 on first load
          echo '{"request_id":"","status":"idle","brief":null,"generated_at":""}' \
            > _site/data/brief_output.json
          echo '[]' > _site/data/vault_index.json

          # Stop Jekyll from processing the folder (it strips leading-underscore dirs etc.)
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

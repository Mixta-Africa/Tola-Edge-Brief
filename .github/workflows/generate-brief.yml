name: Generate Intelligence Brief

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: 'Unique request ID (timestamp) used by browser to match the result'
        required: true
        type: string
      active_market:
        description: 'Market scope: All | Nigeria | Senegal'
        required: true
        type: string
        default: 'All'
      active_domains:
        description: 'Comma-separated active domain codes e.g. D1,D2,D3,D4,D5,D6'
        required: true
        type: string
        default: 'D1,D2,D3,D4,D5,D6'
      custom_prompt:
        description: 'Optional targeted brief request e.g. "DFI appetite affordable housing Nigeria 2026"'
        required: false
        type: string
        default: ''

permissions:
  contents: write   # needed to commit brief output back to main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main branch (source + engine)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-teb-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-teb-

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Run intelligence engine
        id: run_engine
        env:
          GNEWS_API_KEY:      ${{ secrets.GNEWS_API_KEY }}
          NEWSAPI_KEY:        ${{ secrets.NEWSAPI_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY:  ${{ secrets.SAMBANOVA_API_KEY }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY:    ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          REQUEST_ID:      ${{ inputs.request_id }}
          ACTIVE_MARKET:   ${{ inputs.active_market }}
          ACTIVE_DOMAINS:  ${{ inputs.active_domains }}
          CUSTOM_PROMPT:   ${{ inputs.custom_prompt }}
        run: node scripts/engine.js

      - name: Write brief output and update vault on main
        run: |
          # The repo is already checked out at the start of this workflow.
          # We write the brief output directly into data/ on main and commit it.
          # The deploy.yml workflow then picks it up on the next push,
          # OR the browser polls the already-deployed brief_output.json via Pages.
          #
          # Note: brief_output.json is also written to the DEPLOYED site by
          # the deploy.yml — here we persist it to main so it survives redeployments.

          mkdir -p data/vault

          # Write the brief result
          cp /tmp/brief_output.json data/brief_output.json

          # Archive to vault
          DATE_STR=$(date -u +"%Y-%m-%d")
          FILENAME="TEB_${DATE_STR}.json"
          cp /tmp/brief_output.json "data/vault/${FILENAME}"

          # Update vault index
          node -e "
            const fs = require('fs');
            const indexPath = 'data/vault_index.json';
            let index = [];
            try { index = JSON.parse(fs.readFileSync(indexPath, 'utf8')); } catch(e) {}
            const today = '${DATE_STR}';
            index = index.filter(e => e.date !== today);
            index.unshift({ date: today, filename: '${FILENAME}', generatedAt: new Date().toISOString() });
            index = index.slice(0, 30);
            fs.writeFileSync(indexPath, JSON.stringify(index, null, 2));
            console.log('Vault index updated: ' + index.length + ' entries');
          "

      - name: Commit and push brief output to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "Tola Edge Brief"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git add data/brief_output.json data/vault_index.json data/vault/
          git diff --staged --quiet || git commit -m "brief: $(date -u +%Y-%m-%d) [req ${{ inputs.request_id }}]"
          git push origin main

      - name: Trigger redeploy so live site serves the new brief
        env:
          GH_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
        run: |
          curl -s -X POST             -H "Authorization: Bearer ${GH_TOKEN}"             -H "Accept: application/vnd.github.v3+json"             https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches             -d '{"ref":"main"}' && echo "Deploy triggered" || echo "Deploy trigger failed (non-fatal)"

      - name: Log pipeline summary
        if: always()
        run: |
          if [ -f /tmp/brief_output.json ]; then
            node -e "
              const d = JSON.parse(require('fs').readFileSync('/tmp/brief_output.json','utf8'));
              console.log('Status:', d.status);
              console.log('Stories:', d.brief?.stories?.length ?? 0);
              console.log('Articles fetched:', d.meta?.articles_fetched ?? 'n/a');
              console.log('Articles analyzed:', d.meta?.articles_analyzed ?? 'n/a');
              if (d.error) console.log('Error:', d.error);
            "
          else
            echo "No output file found"
          fi

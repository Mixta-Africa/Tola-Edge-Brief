<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Tola Edge Brief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0C2D5A;
      --blue:        #185FA5;
      --blue-mid:    #2176CC;
      --blue-tint:   #EBF3FC;
      --blue-light:  #F0F6FD;
      --teal:        #1D9E75;
      --teal-tint:   #E8F7F2;
      --coral:       #C94C2A;
      --coral-tint:  #FBEEE9;
      --amber:       #B86E00;
      --amber-tint:  #FEF4E4;
      --white:       #FFFFFF;
      --surface:     #F7F8FA;
      --border:      #E4E7EE;
      --border-soft: #EEF0F5;
      --text-primary:   #0C2D5A;
      --text-body:      #2D3748;
      --text-muted:     #6B7A99;
      --text-hint:      #9BA8C0;
      --radius-sm:   6px;
      --radius-md:   10px;
      --radius-lg:   16px;
      --radius-xl:   20px;
      --shadow-sm:   0 1px 3px rgba(12,45,90,0.06), 0 1px 2px rgba(12,45,90,0.04);
      --shadow-md:   0 4px 12px rgba(12,45,90,0.08), 0 2px 4px rgba(12,45,90,0.04);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--surface);
      color: var(--text-body);
      font-size: 15px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .app-shell { max-width: 860px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Header ── */
    .header {
      padding: 48px 0 36px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .header-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-eyebrow::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 2px;
      background: var(--blue);
      border-radius: 1px;
    }

    .header-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 34px;
      font-weight: 500;
      color: var(--navy);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .header-date {
      font-size: 13px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Section labels ── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-hint);
      margin-bottom: 12px;
    }

    /* ── Controls ── */
    .controls-block {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 28px 28px 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .market-pills { display: flex; gap: 8px; margin-bottom: 28px; }

    .pill {
      padding: 7px 18px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text-muted);
      transition: all 0.18s ease;
      user-select: none;
    }

    .pill:hover { border-color: var(--blue-mid); color: var(--blue-mid); }
    .pill.active { background: var(--blue); border-color: var(--blue); color: var(--white); }

    /* ── Domain grid ── */
    .domain-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }

    .domain-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      cursor: pointer;
      background: var(--white);
      transition: all 0.18s ease;
      user-select: none;
      position: relative;
    }

    .domain-card:hover { border-color: var(--blue-mid); background: var(--blue-light); }
    .domain-card.active { border-color: var(--blue); background: var(--blue-tint); }
    .domain-card.active .domain-code { color: var(--blue); }
    .domain-card.active .domain-name { color: var(--navy); }

    .domain-code {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-hint); margin-bottom: 3px;
      transition: color 0.18s;
    }

    .domain-name { font-size: 12px; font-weight: 500; color: var(--text-muted); line-height: 1.3; transition: color 0.18s; }

    .domain-priority { position: absolute; top: 8px; right: 10px; width: 6px; height: 6px; border-radius: 50%; }
    .priority-highest { background: var(--teal); }
    .priority-high    { background: var(--blue); }
    .priority-medium  { background: var(--amber); }
    .priority-low     { background: var(--border); }

    /* ── Custom input ── */
    .custom-input-wrap { position: relative; margin-bottom: 20px; }

    .custom-input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid var(--border); border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif; font-size: 14px;
      color: var(--text-body); background: var(--white);
      outline: none; transition: border-color 0.18s; line-height: 1.5;
    }

    .custom-input::placeholder { color: var(--text-hint); }
    .custom-input:focus { border-color: var(--blue); }

    /* ── Generate button ── */
    .btn-generate {
      width: 100%; padding: 15px 24px;
      background: var(--navy); color: var(--white);
      border: none; border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      letter-spacing: 0.02em; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.2s ease; position: relative; overflow: hidden;
    }

    .btn-generate:hover:not(:disabled) {
      background: var(--blue);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(24,95,165,0.3);
    }

    .btn-generate:active:not(:disabled) { transform: translateY(0); }
    .btn-generate:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
    .btn-generate .btn-arrow { transition: transform 0.2s; }
    .btn-generate:hover:not(:disabled) .btn-arrow { transform: translateX(3px); }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(24,95,165,0.4); }
      70%  { box-shadow: 0 0 0 10px rgba(24,95,165,0); }
      100% { box-shadow: 0 0 0 0 rgba(24,95,165,0); }
    }

    .btn-generate.loading { animation: pulse-ring 1.4s ease-out infinite; background: var(--blue-mid); }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status bar ── */
    .status-bar {
      display: none; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: var(--blue-light); border: 1px solid #C8DDF5;
      border-radius: var(--radius-md); margin-top: 12px;
      font-size: 13px; color: var(--blue);
    }

    .status-bar.visible { display: flex; }
    .status-bar.error { background: var(--coral-tint); border-color: #F2BEB0; color: var(--coral); }

    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .status-dot.pulsing { animation: dot-pulse 1.2s ease-in-out infinite; }

    @keyframes dot-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── Output ── */
    .output-section {
      margin-top: 32px; opacity: 0; transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .output-section.visible { opacity: 1; transform: translateY(0); }

    /* Executive narrative — signature left-accent card */
    .narrative-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 3px solid var(--blue);
      border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
      padding: 28px 32px; margin-bottom: 28px;
      box-shadow: var(--shadow-sm);
    }

    .narrative-header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .narrative-label { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--blue); }
    .narrative-meta { font-size: 11px; color: var(--text-hint); font-family: 'JetBrains Mono', monospace; margin-left: auto; }

    .narrative-body p { font-size: 15px; line-height: 1.75; color: var(--text-body); margin-bottom: 16px; }
    .narrative-body p:last-child { margin-bottom: 0; }

    /* Story cards */
    .stories-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
    .stories-count { font-size: 12px; color: var(--text-hint); }

    .story-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px 28px; margin-bottom: 14px;
      box-shadow: var(--shadow-sm); opacity: 0; transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease, box-shadow 0.2s ease;
    }

    .story-card.visible { opacity: 1; transform: translateY(0); }
    .story-card:hover { box-shadow: var(--shadow-md); }

    .story-tags { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }

    .tag {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 500; white-space: nowrap;
    }

    .tag-impact-high   { background: #FEF3EE; color: #9B3A1A; border: 1px solid #F5C4AE; }
    .tag-impact-medium { background: var(--amber-tint); color: #7A4A00; border: 1px solid #F2D99A; }
    .tag-impact-low    { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }
    .tag-domain        { background: var(--blue-tint); color: var(--blue); border: 1px solid #C4D9F5; }
    .tag-market-ng     { background: var(--teal-tint); color: #0F6E56; border: 1px solid #9FE1CB; }
    .tag-market-sn     { background: #F5F0FE; color: #534AB7; border: 1px solid #CECBF6; }

    .story-title { font-size: 16px; font-weight: 600; color: var(--navy); margin-bottom: 10px; line-height: 1.35; letter-spacing: -0.01em; }
    .story-body  { font-size: 14px; color: var(--text-body); line-height: 1.7; margin-bottom: 16px; }

    .relevance-block { border-top: 1px solid var(--border-soft); padding-top: 14px; }
    .relevance-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue); margin-bottom: 6px; }
    .relevance-text  { font-size: 13.5px; color: var(--text-body); line-height: 1.65; }

    /* ── Action row ── */
    .action-row { display: flex; gap: 10px; margin-top: 24px; }

    .btn-action {
      padding: 10px 20px; border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 7px;
      transition: all 0.18s ease; border: 1.5px solid var(--border);
      background: var(--white); color: var(--text-body);
    }

    .btn-action:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
    .btn-action.saved { border-color: var(--teal); color: var(--teal); background: var(--teal-tint); }

    /* ── Divider ── */
    .section-divider { height: 1px; background: var(--border); margin: 40px 0; }

    /* ── Vault ── */
    .vault-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .vault-list   { display: flex; flex-direction: column; gap: 8px; }

    .vault-entry {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-md); cursor: pointer;
      transition: all 0.15s ease; opacity: 0;
      animation: fade-up 0.3s ease forwards;
    }

    @keyframes fade-up { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .vault-entry:hover { border-color: var(--blue-mid); background: var(--blue-light); }
    .vault-filename { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--navy); }
    .vault-date     { font-size: 12px; color: var(--text-hint); }
    .vault-empty    { font-size: 13px; color: var(--text-hint); font-style: italic; padding: 16px 0; }

    /* ── Loading overlay (app init) ── */
    .app-loading {
      position: fixed; inset: 0;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      z-index: 50; transition: opacity 0.4s ease;
    }

    .app-loading.hidden { opacity: 0; pointer-events: none; }

    .app-loading-inner { text-align: center; }

    .app-loading-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px; color: var(--navy);
      margin-bottom: 16px; letter-spacing: -0.01em;
    }

    .app-loading-bar {
      width: 180px; height: 2px;
      background: var(--border); border-radius: 1px;
      margin: 0 auto; overflow: hidden;
    }

    .app-loading-fill {
      height: 100%; width: 0%;
      background: var(--blue); border-radius: 1px;
      transition: width 0.6s ease;
    }

    .app-loading-status {
      font-size: 12px; color: var(--text-hint);
      margin-top: 12px; font-family: 'JetBrains Mono', monospace;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      padding: 12px 20px; background: var(--navy); color: var(--white);
      border-radius: var(--radius-md); font-size: 13px; font-weight: 500;
      z-index: 200; transform: translateY(20px); opacity: 0;
      transition: all 0.25s ease; pointer-events: none;
    }

    .toast.visible  { transform: translateY(0); opacity: 1; }
    .toast.success  { background: var(--teal); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .domain-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 400px) {
      .domain-grid { grid-template-columns: 1fr; }
      .app-shell   { padding: 0 16px 60px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <!-- App loading screen — shown while config.json is fetched -->
  <div class="app-loading" id="app-loading">
    <div class="app-loading-inner">
      <div class="app-loading-title">The Tola Edge Brief</div>
      <div class="app-loading-bar"><div class="app-loading-fill" id="loading-fill"></div></div>
      <div class="app-loading-status" id="loading-status">Loading configuration…</div>
    </div>
  </div>

  <div class="app-shell">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-eyebrow">Intelligence Brief · Tola Akinsulire</div>
      <h1 class="header-title">The Tola Edge Brief</h1>
      <div class="header-date" id="header-date"></div>
    </header>

    <!-- ── Controls ── -->
    <div class="controls-block">

      <div class="section-label">Market Scope</div>
      <div class="market-pills">
        <button class="pill active" data-market="All"     onclick="setMarket('All')">All Markets</button>
        <button class="pill"        data-market="Nigeria" onclick="setMarket('Nigeria')">Nigeria</button>
        <button class="pill"        data-market="Senegal" onclick="setMarket('Senegal')">Senegal</button>
      </div>

      <div class="section-label">Intelligence Domains</div>
      <div class="domain-grid" id="domain-grid"></div>

      <div class="custom-input-wrap">
        <input
          class="custom-input"
          id="custom-prompt"
          type="text"
          placeholder="Target a specific signal — e.g. &quot;DFI appetite for affordable housing Nigeria 2026&quot;"
          maxlength="280"
        />
      </div>

      <button class="btn-generate" id="btn-generate" onclick="generateBrief()">
        <span id="btn-text">Generate Intelligence Brief</span>
        <span class="btn-arrow" id="btn-arrow">→</span>
      </button>

      <div class="status-bar" id="status-bar">
        <span class="status-dot pulsing" id="status-dot"></span>
        <span id="status-text">Initiating intelligence scan…</span>
      </div>
    </div>

    <!-- ── Brief Output ── -->
    <div class="output-section" id="output-section">

      <div class="narrative-card">
        <div class="narrative-header">
          <span class="narrative-label">Executive Narrative</span>
          <span class="narrative-meta" id="narrative-meta"></span>
        </div>
        <div class="narrative-body" id="narrative-body"></div>
      </div>

      <div class="stories-header">
        <div class="section-label" style="margin-bottom:0">Impact-Rated Stories</div>
        <span class="stories-count" id="stories-count"></span>
      </div>
      <div id="stories-container"></div>

      <div class="action-row">
        <button class="btn-action" onclick="copyBrief()"><span>⎘</span> Copy Brief</button>
        <button class="btn-action" id="btn-save" onclick="saveBrief()"><span>↓</span> Save to Vault</button>
      </div>
    </div>

    <div class="section-divider"></div>

    <!-- ── Knowledge Vault ── -->
    <div class="vault-section">
      <div class="vault-header">
        <div class="section-label" style="margin-bottom:0">Knowledge Vault</div>
        <span id="vault-count" style="font-size:12px;color:var(--text-hint)"></span>
      </div>
      <div class="vault-list" id="vault-list">
        <div class="vault-empty">Loading vault…</div>
      </div>
    </div>

  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <script>
  'use strict';

  // ─── CONFIG — loaded from /data/config.json (written by deploy.yml from Secrets) ──
  // No tokens in code. No localStorage. No modals. Config arrives from the server.
  let CFG = { owner: '', repo: '', token: '' };

  // ─── STATE ───────────────────────────────────────────────────────────────

  const DOMAINS = {
    D1: { name: 'Capital & Financing',  dot: 'priority-high'    },
    D2: { name: 'Land & Regulatory',    dot: 'priority-high'    },
    D3: { name: 'Demand Intelligence',  dot: 'priority-medium'  },
    D4: { name: 'Partnership & JV',     dot: 'priority-medium'  },
    D5: { name: 'Geopolitical Risk',    dot: 'priority-low'     },
    D6: { name: 'Market Creation',      dot: 'priority-highest' },
  };

  let activeMarket  = 'All';
  let activeDomains = new Set(['D1','D2','D3','D4','D5','D6']);
  let isGenerating  = false;
  let currentBrief  = null;
  let pollInterval  = null;
  let currentReqId  = null;

  // ─── BOOT — fetch config, then initialise app ─────────────────────────────

  async function boot() {
    setLoadingStatus('Loading configuration…', 20);

    try {
      const res = await fetch(`/data/config.json?t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error(`config.json not found (${res.status})`);
      const cfg = await res.json();
      if (!cfg.owner || !cfg.repo || !cfg.token) throw new Error('config.json is incomplete');
      CFG = cfg;
    } catch (e) {
      setLoadingStatus(`Configuration error: ${e.message}`, 100);
      console.error('[Boot] Config load failed:', e.message);
      // Still reveal the app — let generateBrief() show the error when triggered
    }

    setLoadingStatus('Ready', 100);
    await sleep(400);

    // Hide loading screen
    const loader = document.getElementById('app-loading');
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 500);

    // Render UI
    renderDate();
    renderDomains();
    loadVault();
  }

  function setLoadingStatus(msg, pct) {
    document.getElementById('loading-status').textContent = msg;
    document.getElementById('loading-fill').style.width = pct + '%';
  }

  function renderDate() {
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('header-date').textContent =
      new Date().toLocaleDateString('en-GB', opts);
  }

  function renderDomains() {
    const grid = document.getElementById('domain-grid');
    grid.innerHTML = '';
    for (const [code, domain] of Object.entries(DOMAINS)) {
      const card = document.createElement('div');
      card.className = 'domain-card' + (activeDomains.has(code) ? ' active' : '');
      card.dataset.code = code;
      card.onclick = () => toggleDomain(code);
      card.innerHTML = `
        <div class="domain-priority ${domain.dot}"></div>
        <div class="domain-code">${code}</div>
        <div class="domain-name">${domain.name}</div>
      `;
      grid.appendChild(card);
    }
  }

  // ─── CONTROLS ────────────────────────────────────────────────────────────

  function setMarket(market) {
    activeMarket = market;
    document.querySelectorAll('.pill').forEach(p =>
      p.classList.toggle('active', p.dataset.market === market)
    );
  }

  function toggleDomain(code) {
    if (activeDomains.has(code)) {
      if (activeDomains.size <= 1) return;
      activeDomains.delete(code);
    } else {
      activeDomains.add(code);
    }
    renderDomains();
  }

  // ─── GENERATE ────────────────────────────────────────────────────────────

  async function generateBrief() {
    if (!CFG.token || !CFG.owner || !CFG.repo) {
      showToast('App configuration not loaded — check deploy logs', 'error');
      return;
    }

    if (isGenerating) return;
    isGenerating  = true;
    currentBrief  = null;
    currentReqId  = String(Date.now());

    const btnGenerate = document.getElementById('btn-generate');
    const btnText     = document.getElementById('btn-text');
    const btnArrow    = document.getElementById('btn-arrow');
    btnGenerate.disabled = true;
    btnGenerate.classList.add('loading');
    btnText.textContent = 'Dispatching to intelligence engine…';
    btnArrow.style.display = 'none';
    showStatus('Triggering GitHub Actions intelligence run…', false);

    try {
      const customPrompt = document.getElementById('custom-prompt').value.trim();
      const domainsStr   = Array.from(activeDomains).sort().join(',');

      const dispatchRes = await fetch(
        `https://api.github.com/repos/${CFG.owner}/${CFG.repo}/actions/workflows/generate-brief.yml/dispatches`,
        {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${CFG.token}`,
            'Accept':        'application/vnd.github.v3+json',
            'Content-Type':  'application/json',
          },
          body: JSON.stringify({
            ref: 'main',
            inputs: {
              request_id:     currentReqId,
              active_market:  activeMarket,
              active_domains: domainsStr,
              custom_prompt:  customPrompt,
            },
          }),
        }
      );

      if (!dispatchRes.ok) {
        const err = await dispatchRes.json().catch(() => ({}));
        throw new Error(`GitHub API ${dispatchRes.status}: ${err.message || dispatchRes.statusText}`);
      }

      showStatus('Intelligence engine running — scanning live market sources…', true);
      btnText.textContent = 'Generating…';
      startPolling();

    } catch (err) {
      resetGenerateButton();
      showStatus(`Failed to trigger: ${err.message}`, false, true);
      console.error('[App]', err);
    }
  }

  function startPolling() {
    let pollCount = 0;
    const MAX_POLLS = 100; // 100 × 5s = ~8 min (Puppeteer runs can take a while)

    const statusMessages = [
      'Intelligence engine running — scanning live market sources…',
      'Fetching from GNews, NewsAPI, RSS feeds…',
      'Enriching articles with full text via Puppeteer…',
      'Running 6-LLM analysis chain per article…',
      'Synthesising executive narrative…',
      'Validating story citations and impact ratings…',
      'Finalising brief — almost ready…',
    ];

    pollInterval = setInterval(async () => {
      pollCount++;
      const msgIdx = Math.min(Math.floor(pollCount / 6), statusMessages.length - 1);
      showStatus(statusMessages[msgIdx], true);

      if (pollCount > MAX_POLLS) {
        clearInterval(pollInterval);
        resetGenerateButton();
        showStatus('Generation timed out — the pipeline may still be running. Refresh in a minute.', false, true);
        return;
      }

      try {
        const res = await fetch(
          `https://${CFG.owner}.github.io/${CFG.repo}/data/brief_output.json?t=${Date.now()}`,
          { cache: 'no-store' }
        );
        if (!res.ok) return;
        const data = await res.json();
        if (data.request_id !== currentReqId) return;

        clearInterval(pollInterval);

        if (data.status === 'success' && data.brief) {
          currentBrief = data;
          renderBrief(data);
          resetGenerateButton();
          hideStatus();
          loadVault();
        } else {
          resetGenerateButton();
          showStatus(`Brief generation failed: ${data.error || 'Unknown error'}`, false, true);
        }
      } catch (_) { /* transient — keep polling */ }
    }, 5000);
  }

  function resetGenerateButton() {
    isGenerating = false;
    const btn    = document.getElementById('btn-generate');
    const btnTxt = document.getElementById('btn-text');
    const btnArr = document.getElementById('btn-arrow');
    btn.disabled = false;
    btn.classList.remove('loading');
    btnTxt.textContent = 'Generate Intelligence Brief';
    btnArr.style.display = '';
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  }

  // ─── RENDER BRIEF ────────────────────────────────────────────────────────

  function renderBrief(data) {
    const brief = data.brief;
    const outputSection = document.getElementById('output-section');

    // Narrative
    const paragraphs = brief.narrative
      .split('\n\n').filter(p => p.trim())
      .map(p => `<p>${escHtml(p.trim())}</p>`).join('');

    document.getElementById('narrative-body').innerHTML = paragraphs;
    document.getElementById('narrative-meta').textContent =
      formatTime(data.generated_at) + ' · ' + (data.meta?.market || activeMarket);

    // Stories
    const container = document.getElementById('stories-container');
    container.innerHTML = '';
    document.getElementById('stories-count').textContent =
      `${brief.stories.length} stor${brief.stories.length === 1 ? 'y' : 'ies'}`;

    brief.stories.forEach((story, i) => {
      const card = document.createElement('div');
      card.className = 'story-card';
      card.style.transitionDelay = `${i * 60}ms`;

      const impactClass = { High: 'tag-impact-high', Medium: 'tag-impact-medium', Low: 'tag-impact-low' }[story.impact] || 'tag-impact-low';
      const marketClass = story.market === 'Senegal' ? 'tag-market-sn' : 'tag-market-ng';

      card.innerHTML = `
        <div class="story-tags">
          <span class="tag ${impactClass}">${escHtml(story.impact)}</span>
          <span class="tag tag-domain">${escHtml(story.domain)}</span>
          <span class="tag ${marketClass}">${escHtml(story.market)}</span>
        </div>
        <div class="story-title">${escHtml(story.title)}</div>
        <div class="story-body">${escHtml(story.body)}</div>
        <div class="relevance-block">
          <div class="relevance-label">Mixta Relevance</div>
          <div class="relevance-text">${escHtml(story.relevance)}</div>
        </div>
      `;
      container.appendChild(card);
      requestAnimationFrame(() => setTimeout(() => card.classList.add('visible'), 60 + i * 60));
    });

    document.getElementById('btn-save').classList.remove('saved');
    document.getElementById('btn-save').innerHTML = '<span>↓</span> Save to Vault';

    outputSection.classList.add('visible');
    setTimeout(() => outputSection.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }

  // ─── ACTIONS ─────────────────────────────────────────────────────────────

  function copyBrief() {
    if (!currentBrief) return;
    const brief = currentBrief.brief;
    let text = `THE TOLA EDGE BRIEF — ${new Date().toLocaleDateString('en-GB', { dateStyle: 'long' })}\n`;
    text += `Generated: ${formatTime(currentBrief.generated_at)}\n\n`;
    text += `EXECUTIVE NARRATIVE\n${'─'.repeat(40)}\n${brief.narrative}\n\n`;
    text += `INTELLIGENCE STORIES\n${'─'.repeat(40)}\n`;
    brief.stories.forEach((s, i) => {
      text += `\n[${i+1}] ${s.impact.toUpperCase()} | ${s.domain} | ${s.market}\n`;
      text += `${s.title}\n\n${s.body}\n\nMixta Relevance: ${s.relevance}\n`;
    });
    navigator.clipboard.writeText(text)
      .then(() => showToast('Brief copied to clipboard', 'success'))
      .catch(() => showToast('Could not copy — select and copy manually', 'error'));
  }

  async function saveBrief() {
    if (!currentBrief) return;
    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.innerHTML = '<span>↓</span> Saving…';
    copyBrief();
    setTimeout(() => {
      btn.classList.add('saved');
      btn.innerHTML = '<span>✓</span> Saved to Vault';
      btn.disabled = false;
      showToast('Brief saved — vault updated', 'success');
      loadVault();
    }, 800);
  }

  // ─── VAULT ───────────────────────────────────────────────────────────────

  async function loadVault() {
    const list  = document.getElementById('vault-list');
    const count = document.getElementById('vault-count');

    if (!CFG.owner || !CFG.repo) {
      list.innerHTML = '<div class="vault-empty">Vault unavailable — configuration not loaded.</div>';
      return;
    }

    try {
      const res = await fetch(
        `https://${CFG.owner}.github.io/${CFG.repo}/data/vault_index.json?t=${Date.now()}`,
        { cache: 'no-store' }
      );
      if (!res.ok) throw new Error('not found');
      const entries = await res.json();

      if (!entries.length) {
        list.innerHTML = '<div class="vault-empty">No briefs in vault yet — generate your first brief above.</div>';
        count.textContent = '';
        return;
      }

      count.textContent = `${entries.length} brief${entries.length === 1 ? '' : 's'} archived`;
      list.innerHTML = '';

      entries.slice(0, 15).forEach((entry, i) => {
        const el = document.createElement('div');
        el.className = 'vault-entry';
        el.style.animationDelay = `${i * 35}ms`;
        const displayDate = entry.date
          ? new Date(entry.date + 'T12:00:00Z').toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })
          : entry.date;
        el.innerHTML = `
          <span class="vault-filename">${escHtml(entry.filename)}</span>
          <span class="vault-date">${escHtml(displayDate)}</span>
        `;
        el.onclick = () => loadVaultEntry(entry.filename);
        list.appendChild(el);
      });

    } catch (_) {
      list.innerHTML = '<div class="vault-empty">Vault not yet initialised — generate your first brief to begin.</div>';
      count.textContent = '';
    }
  }

  async function loadVaultEntry(filename) {
    try {
      const res = await fetch(
        `https://${CFG.owner}.github.io/${CFG.repo}/vault/${filename}?t=${Date.now()}`,
        { cache: 'no-store' }
      );
      if (!res.ok) throw new Error('not found');
      const data = await res.json();
      currentBrief = data;
      renderBrief(data);
      window.scrollTo({ top: 0, behavior: 'smooth' });
      showToast(`Loaded ${filename.replace('TEB_','').replace('.json','')}`, 'success');
    } catch (_) {
      showToast('Could not load this brief', 'error');
    }
  }

  // ─── STATUS / TOAST ──────────────────────────────────────────────────────

  function showStatus(msg, pulsing = true, isError = false) {
    const bar  = document.getElementById('status-bar');
    const dot  = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    text.textContent = msg;
    dot.classList.toggle('pulsing', pulsing);
    bar.classList.add('visible');
    bar.classList.toggle('error', isError);
  }

  function hideStatus() {
    document.getElementById('status-bar').classList.remove('visible');
  }

  let toastTimer;
  function showToast(msg, type = '') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast visible' + (type === 'success' ? ' success' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('visible'), 3200);
  }

  // ─── UTILS ───────────────────────────────────────────────────────────────

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function formatTime(isoStr) {
    if (!isoStr) return '';
    try { return new Date(isoStr).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) + ' WAT'; }
    catch { return ''; }
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ─── START ───────────────────────────────────────────────────────────────
  boot();
  </script>
</body>
